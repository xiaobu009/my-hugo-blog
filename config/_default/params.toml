mainSections   = ["post"]
rssFullContent = true
favicon        = "img/avatar.png"

[footer]
    since = 2020

[sidebar]
    emoji    = "✏️"
    subtitle = "每一步都是探索，每一步都有收获，每一步都在成长。"
    avatar   = "img/avatar.png"

[article]
    [article.license]
        enabled = false
        default = "Licensed under CC BY-NC-SA 4.0"

[widgets]
    homepage = [
        { type = "search" },
        { type = "archives", params = { limit = 2 } },
        { type = "categories", params = { limit = 10 } },
        { type = "tag-cloud", params = { limit = 20 } },
    ]
    page     = [
        { type = "toc" },
        { type = "categories", params = { limit = 10 } },
        { type = "tag-cloud", params = { limit = 20 } },        
    ]

[comments]
    # See complete configuration in config/_default/params.toml
    enabled  = false
    provider = "disqus"

# GDPR Cookie Consent Configuration
# When enabled, analytics and functional cookies require user consent
[cookies]
    enabled = false

    [cookies.categories]
        analytics  = true
        functional = true

